<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QalbRisk · Heart Failure Assessment</title>
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="/">
          <img class="brand-logo" src="/static/logo.png" alt="" width="40" height="40" />
          <span class="brand-text">
            <strong>QalbRisk</strong>
            <small>Heart failure assessment</small>
          </span>
        </a>
        <nav class="header-nav">
          <a href="/" class="active">Assessment</a>
          <a href="/disclaimer">Disclaimer</a>
        </nav>
      </header>

      <main class="page-main">
        <div class="layout">
          <section class="panel">
            <p class="eyebrow">Patient intake</p>
            <h1>Clinical parameters</h1>
            <p class="lead">Enter the values below to generate a risk estimate.</p>

            <form id="predict-form">
              <div class="form-section">
                <h2>Demographics</h2>
                <div class="field-grid">
                  <div class="field">
                    <div class="field-label-row">
                      <label for="age">Age</label>
                    </div>
                    <input id="age" name="age" type="number" min="0" max="120" value="60" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="sex">Sex</label>
                    </div>
                    <select id="sex" name="sex">
                      <option value="1">Male</option>
                      <option value="0">Female</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="form-section">
                <h2>Conditions</h2>
                <div class="field-grid">
                  <div class="field">
                    <div class="field-label-row">
                      <label for="anaemia">Anaemia</label>
                      <span class="info-tip" data-help="anaemia">
                        <button type="button" class="info-btn" aria-label="Anaemia information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <select id="anaemia" name="anaemia">
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="diabetes">Diabetes</label>
                    </div>
                    <select id="diabetes" name="diabetes">
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="high_blood_pressure">High blood pressure</label>
                    </div>
                    <select id="high_blood_pressure" name="high_blood_pressure">
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="smoking">Smoking</label>
                    </div>
                    <select id="smoking" name="smoking">
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="form-section">
                <h2>Clinical markers</h2>
                <div class="field-grid">
                  <div class="field">
                    <div class="field-label-row">
                      <label for="ejection_fraction">Ejection fraction (%)</label>
                      <span class="info-tip" data-help="ejection_fraction">
                        <button type="button" class="info-btn" aria-label="Ejection fraction information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <input id="ejection_fraction" name="ejection_fraction" type="number" min="0" max="100" value="38" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="creatinine_phosphokinase">Creatinine phosphokinase</label>
                      <span class="info-tip" data-help="creatinine_phosphokinase">
                        <button type="button" class="info-btn" aria-label="CPK information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <input id="creatinine_phosphokinase" name="creatinine_phosphokinase" type="number" min="0" value="582" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="platelets">Platelets</label>
                    </div>
                    <input id="platelets" name="platelets" type="number" min="0" value="265000" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="serum_creatinine">Serum creatinine</label>
                      <span class="info-tip" data-help="serum_creatinine">
                        <button type="button" class="info-btn" aria-label="Serum creatinine information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <input id="serum_creatinine" name="serum_creatinine" type="number" min="0" step="0.1" value="1.9" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="serum_sodium">Serum sodium</label>
                      <span class="info-tip" data-help="serum_sodium">
                        <button type="button" class="info-btn" aria-label="Serum sodium information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <input id="serum_sodium" name="serum_sodium" type="number" min="0" value="130" required />
                  </div>

                  <div class="field">
                    <div class="field-label-row">
                      <label for="time">Follow-up period (days)</label>
                      <span class="info-tip" data-help="time">
                        <button type="button" class="info-btn" aria-label="Follow-up period information">i</button>
                        <span class="info-popover" role="tooltip"></span>
                      </span>
                    </div>
                    <input id="time" name="time" type="number" min="0" value="4" required />
                  </div>
                </div>
              </div>

              <div class="form-actions">
                <button class="btn btn-primary" type="submit" id="submit-btn">Run assessment</button>
                <button class="btn btn-ghost" type="reset" id="reset-btn">Reset</button>
              </div>

              <div class="error-box" id="error"></div>
            </form>
          </section>

          <aside class="result-panel">
            <section class="panel result-card" id="result-card" aria-live="polite">
              <p class="eyebrow">Assessment result</p>
              <span class="risk-badge" id="risk-badge">Higher risk</span>
              <p class="risk-score" id="probability">0%</p>
              <div class="meter" id="risk-meter"><span id="risk-meter-fill"></span></div>
              <p id="message"></p>

              <div id="why-block" hidden>
                <h2 style="font-size: 0.92rem; margin: 18px 0 10px; color: var(--teal-dark)">Contributing factors</h2>
                <ul class="factor-list" id="why-list"></ul>
              </div>
            </section>
          </aside>
        </div>
      </main>

      <footer class="app-footer">
        <p>
          Built by
          <a href="https://hellouzair.com" target="_blank" rel="noopener noreferrer">Uzair Saleem</a>
        </p>
      </footer>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
